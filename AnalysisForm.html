<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投稿分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      padding: 16px;
      padding-bottom: 32px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0f172a;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="date"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      font-size: 0.9rem;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
    }
    .file-group {
      margin-bottom: 12px;
    }
    .file-group label {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      margin-top: 24px;
      cursor: pointer;
    }
    button[type="submit"]:active {
      background: #2563eb;
    }
    .msg {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .msg.success { background: #dcfce7; color: #166534; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    .hint {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>📊 投稿分析</h1>
  <div id="msg"></div>
  <form id="form" method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="date">日付 *</label>
      <input type="date" id="date" name="date" required>
    </div>
    <div class="form-group">
      <label for="title">投稿のタイトル</label>
      <input type="text" id="title" name="title" placeholder="例: ちょっと見せて【I】">
    </div>
    <div class="form-group">
      <label for="link">投稿のリンク</label>
      <input type="url" id="link" name="link" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>インサイトのスクショ（最大5枚）</label>
      <div class="file-group">
        <input type="file" name="image1" accept="image/*" capture="environment">
      </div>
      <div class="file-group">
        <input type="file" name="image2" accept="image/*" capture="environment">
      </div>
      <div class="file-group">
        <input type="file" name="image3" accept="image/*" capture="environment">
      </div>
      <div class="file-group">
        <input type="file" name="image4" accept="image/*" capture="environment">
      </div>
      <div class="file-group">
        <input type="file" name="image5" accept="image/*" capture="environment">
      </div>
      <p class="hint">スマホでは「写真を撮る」か「ライブラリから選択」</p>
    </div>
    <div class="form-group">
      <label for="analysis">分析 *</label>
      <textarea id="analysis" name="analysis" required placeholder="この投稿が伸びなかった理由、改善点などを記入"></textarea>
    </div>
    <button type="submit">保存</button>
  </form>

  <script>
    (function() {
      var form = document.getElementById("form");
      var msgEl = document.getElementById("msg");
      var dateInput = document.getElementById("date");

      function todayStr() {
        var d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      }
      dateInput.value = todayStr();

      form.addEventListener("submit", function(e) {
        e.preventDefault();
        msgEl.innerHTML = "";
        msgEl.className = "";

        var formData = new FormData(form);
        var xhr = new XMLHttpRequest();
        xhr.open("POST", form.action || "");
        xhr.onload = function() {
          try {
            var res = JSON.parse(xhr.responseText);
            msgEl.className = "msg " + (res.ok ? "success" : "error");
            msgEl.textContent = res.message || (res.ok ? "保存しました" : "エラー");
            if (res.ok) form.reset();
            dateInput.value = todayStr();
          } catch (err) {
            msgEl.className = "msg error";
            msgEl.textContent = "応答の解析に失敗しました";
          }
        };
        xhr.onerror = function() {
          msgEl.className = "msg error";
          msgEl.textContent = "送信に失敗しました";
        };
        xhr.send(formData);
      });
    })();
  </script>
</body>
</html>
